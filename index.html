<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Cadet Training Dashboard - Cloud</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>" />
    
    <!-- CDN dependencies (pinned to exact versions).
         SRI hashes should be added once verifiable from a network-connected environment
         by running: ./generate-sri.sh -->
    <script crossorigin="anonymous" src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Tailwind CSS: pre-generated static file (see build.js / package.json) -->
    <link rel="stylesheet" href="tailwind.css" />

    <script crossorigin="anonymous" src="https://unpkg.com/lucide@0.358.0/dist/umd/lucide.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Supabase Client -->
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.99.1/dist/umd/supabase.js"></script>

    <style>
        body { background-color: #f1f5f9; }
        .drag-active { border-color: #3b82f6; background-color: #eff6ff; }
        /* Planner Table Styles */
        .planner-table th, .planner-table td {
            white-space: nowrap;
        }
        .planner-container {
            overflow-x: auto;
            max-height: 75vh;
        }
        /* Sticky Headers */
        .planner-table thead {
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .planner-table th {
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        /* Sticky First Column (Module Titles) */
        .planner-table th:first-child,
        .planner-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 60 !important; /* Ensure module titles dominate horizontal scroll */
            background-color: #FFFFFF !important; /* Force solid white background for row cells */
            border-right: 2px solid #e2e8f0;
        }
        /* Corner Cell (Module / Cadet) fix */
        .planner-table thead tr th:first-child {
            z-index: 70 !important; /* Ensure corner is highest layer in header row, dominating top scroll AND left scroll */
            background-color: #f1f5f9 !important; /* Force background of header row color (slate-100) */
        }
        /* End Corner Cell fix */

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .bg-passed { background-color: #0DAC50 !important; }

        /* Cadet Column Selection Highlighting */
        .col-selected-header {
            background-color: #dbeafe !important; /* blue-100 */
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
            cursor: pointer;
        }
        .col-unselected-header {
            cursor: pointer;
        }
        .col-unselected-header:hover {
            background-color: #e0f2fe !important; /* sky-100 */
        }
        .col-selected-incomplete {
            background-color: #fef9c3 !important; /* yellow-100 — highlights gaps */
        }
        .col-selected-complete {
            background-color: #0DAC50 !important; /* keep standard green */
        }
        
        /* Spec Level Colors */
        .spec-basic { background-color: #fdba74 !important; color: #7c2d12; font-weight: 700; font-size: 12px; }
        .spec-int { background-color: #94a3b8 !important; color: #ffffff; font-weight: 700; font-size: 12px; }
        .spec-adv { background-color: #fcd34d !important; color: #78350f; font-weight: 800; font-size: 12px; }
        .spec-junior { background-color: #f1f5f9 !important; color: #94a3b8; font-style: italic; font-size: 11px; }
        .spec-none { color: #cbd5e1; }

        /* Waterborne Status Colors - UPDATED SPECIFICITY to override sticky column white background */
        .planner-table td.status-cox-pending { background-color: #add8e6 !important; color: black !important; } /* Light Blue */
        .planner-table td.status-cox-awarded { background-color: #003366 !important; color: white !important; } /* Navy Blue */
        .planner-table td.status-master-pending { background-color: #ffffe0 !important; color: black !important; } /* Light Yellow */
        .planner-table td.status-master-awarded { background-color: #ffd700 !important; color: black !important; } /* Gold */
        
        /* Progress Chart Checkmarks */
        .bg-red-600 { color: white; font-weight: bold; font-size: 14px; }
        .bg-blue-600 { color: white; font-weight: bold; font-size: 14px; }
        .bg-green-600 { color: white; font-weight: bold; font-size: 14px; }
        .bg-yellow-600 { color: white; font-weight: bold; font-size: 14px; }
        .bg-purple-600 { color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="dashboard.js"></script>
</body>
