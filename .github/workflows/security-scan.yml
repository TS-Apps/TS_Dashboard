name: OWASP ZAP Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  issues: write   # ZAP baseline records findings by creating/updating an issue

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # needed so .zap/rules.tsv is available to the scan

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'https://ts-apps.github.io/TS_Dashboard/'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'  # Include alpha rules
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html